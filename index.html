<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- ✅ Microsoft Clarity Tracking Code -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w2pql1315q");
    </script>
    
    <!-- ✅ SEO & Meta Tags (American English) -->
    <title>LipoWave™ Official Website | Now Liposlend Drops</title>
    <meta name="description" content="LipoWave has officially been renamed to Liposlend Drops. The same powerful formula you trust. Official store.">
    <link rel="canonical" href="https://lipowave.24offers.shop/">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden; 
        }
        
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('images/lipowave-mob.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        @media (min-width: 1024px) {
            .page-bg { 
                background-image: url('images/lipowave.png'); 
            }
        }

        /* Overlay sem o efeito de blur (desfoque) conforme solicitado */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85); /* Fundo escuro levemente mais opaco para contraste */
            display: none; /* Começa escondido para o delay */
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Modal Reduzido: max-width de 480px para 400px */
        .trademark-modal {
            background: white;
            width: 100%;
            max-width: 400px; 
            border-radius: 1.5rem;
            position: relative;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover { background: #000; }

        .btn-continue {
            background: #0a3121; 
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 8px 15px -3px rgba(10, 49, 33, 0.3);
            display: block;
            text-decoration: none;
        }

        .btn-continue:hover {
            background: #061f15;
            transform: translateY(-1px);
        }

        .highlight-green {
            color: #00a300; 
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Imagem de fundo nítida -->
    <div class="page-bg"></div>

    <!-- Modal de Aviso -->
    <div id="modalOverlay" class="overlay">
        <div class="trademark-modal">
            <!-- Botão fechar -->
            <div class="close-btn" onclick="closeModal()">
                <i data-lucide="x" class="w-4 h-4"></i>
            </div>

            <!-- Imagem do produto um pouco menor -->
            <div class="mb-5 flex justify-center">
                <img src="images/lipowave-liposlend.png" alt="LipoWave to Liposlend" class="max-w-[220px] h-auto pointer-events-none">
            </div>

            <!-- Conteúdo textual -->
            <div class="space-y-3 mb-6">
                <h2 class="text-lg sm:text-xl font-bold text-slate-900 leading-tight uppercase">
                    DUE TO TRADEMARK REGULATIONS
                </h2>
                <p class="text-base text-slate-700 font-medium">
                    In <span class="font-bold">Kansas</span> and your state,
                </p>
                <p class="text-base text-slate-700">
                    <span class="font-bold">Lipowave</span> is now officially renamed as
                </p>
                <div class="text-2xl sm:text-3xl highlight-green tracking-tight">
                    LIPOSLEND Drops
                </div>
                <p class="text-sm text-slate-800 font-semibold">
                    The formula remains exactly the same!
                </p>
            </div>

            <!-- Botão de ação -->
            <a href="https://mwebora.com/8922/1671/7/??" class="btn-continue">
                CONTINUE
            </a>

            <!-- Contador -->
            <p id="timer" class="mt-4 text-slate-500 text-[12px] font-medium">
                Closes automatically in 15s
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let timeLeft = 15;
        let countdownInterval;
        const timerElement = document.getElementById('timer');
        const modalOverlay = document.getElementById('modalOverlay');

        // Função para iniciar o contador
        function startTimer() {
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    closeModal();
                } else {
                    timerElement.innerText = `Closes automatically in ${timeLeft}s`;
                }
            }, 1000);
        }

        // Delay de 3 segundos para abrir o modal
        window.onload = function() {
            setTimeout(() => {
                modalOverlay.style.display = 'flex';
                setTimeout(() => {
                    modalOverlay.style.opacity = '1';
                    startTimer();
                }, 50);
            }, 3000); // 3000ms = 3 segundos
        };

        function closeModal() {
            modalOverlay.style.opacity = '0';
            setTimeout(() => {
                modalOverlay.style.display = 'none';
                clearInterval(countdownInterval);
            }, 500);
        }

        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') closeModal(); 
        });
    </script>
</body>
</html>
