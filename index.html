<!DOCTYPE html>
<html lang="de-DE">
<head>
    <meta charset="UTF-8">

            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

    <!-- ✅ SEO & Meta Tags -->
    <title>LipoWave™ Offizielle Website Deutschland | Jetzt Liposlend Drops</title>
    <meta name="description" content="LipoWave ist jetzt Liposlend Drops. Die gleiche bewährte Formel unter neuem Namen. Offizielle Herstellerseite Deutschland.">
    <link rel="canonical" href="https://lipowave.24offers.shop/">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden; 
        }
        
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('images/lipowave-mob.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        @media (min-width: 1024px) {
            .page-bg { 
                background-image: url('images/lipowave.png'); 
            }
        }

        /* Overlay semi-transparente para dar destaque ao modal */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }

        /* Design do Modal inspirado na captura de tela */
        .trademark-modal {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 2rem;
            position: relative;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 32px;
            height: 32px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover { background: #000; }

        .btn-continue {
            background: #0a3121; /* Verde escuro da imagem */
            color: white;
            width: 100%;
            padding: 1.25rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(10, 49, 33, 0.3);
            display: block;
            text-decoration: none;
        }

        .btn-continue:hover {
            background: #061f15;
            transform: translateY(-2px);
        }

        .highlight-green {
            color: #00a300; /* Verde vibrante da imagem */
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Fundo da Página -->
    <div class="page-bg"></div>

    <!-- Modal de Aviso (Substituindo o Cookie Banner) -->
    <div id="modalOverlay" class="overlay">
        <div class="trademark-modal">
            <!-- Botão Fechar -->
            <div class="close-btn" onclick="closeModal()">
                <i data-lucide="x" class="w-5 h-5"></i>
            </div>

            <!-- Imagem do Produto (Comparativo) -->
            <div class="mb-6 flex justify-center">
                <img src="images/lipowave-liposlend.png" alt="LipoWave to Liposlend" class="max-w-[280px] h-auto pointer-events-none">
            </div>

            <!-- Conteúdo de Texto -->
            <div class="space-y-4 mb-8">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900 leading-tight uppercase">
                    DUE TO TRADEMARK REGULATIONS
                </h2>
                <p class="text-lg text-slate-700 font-medium">
                    In <span class="font-bold">Germany</span> and your state,
                </p>
                <p class="text-lg text-slate-700">
                    <span class="font-bold">Lipowave</span> is now officially renamed as
                </p>
                <div class="text-3xl sm:text-4xl highlight-green tracking-tight">
                    LIPOSLEND Drops
                </div>
                <p class="text-lg text-slate-800 font-semibold">
                    The formula remains exactly the same!
                </p>
            </div>

            <!-- Botão de Ação -->
            <a href="https://mwebora.com/8922/1671/7/??" class="btn-continue">
                CONTINUE
            </a>

            <!-- Contador -->
            <p id="timer" class="mt-4 text-slate-500 text-sm font-medium">
                Closes automatically in 15s
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Lógica do Cronômetro
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const modalOverlay = document.getElementById('modalOverlay');

        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                closeModal();
            } else {
                timerElement.innerText = `Closes automatically in ${timeLeft}s`;
            }
        }, 1000);

        function closeModal() {
            modalOverlay.style.opacity = '0';
            modalOverlay.style.transition = 'opacity 0.4s ease';
            setTimeout(() => {
                modalOverlay.style.display = 'none';
            }, 400);
            clearInterval(countdown);
        }

        // Prevenir fechamento ao clicar fora por segurança (opcional)
        // modalOverlay.addEventListener('click', (e) => {
        //     if(e.target === modalOverlay) closeModal();
        // });
    </script>
</body>
</html>
