    <!-- JSON-LD DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "LipoWave",
      "image": "https://lipowave.offersnowx.shop/assets/img/product.png",

      "brand": { "@type": "Brand", "name": "LipoWave" },

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden; 
        }
        
        /* Fundo da Página - Garantindo visibilidade */
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 1; /* Fica acima do body mas abaixo do overlay */
            background-image: url('images/lipowave-mob.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        @media (min-width: 1024px) {
            .page-bg { 
                background-image: url('images/lipowave.png'); 
            }
        }

        /* Overlay semi-transparente para focar no modal sem esconder o fundo totalmente */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex; 
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* Modal Compacto (Estilo Cookie/Aviso da Foto) */
        .trademark-modal {
            background: white;
            width: 100%;
            max-width: 420px; 
            border-radius: 2rem;
            position: relative;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* X redirecionando para a oferta */
        .close-link {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 32px;
            height: 32px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .close-link:hover { background: #000; }

        /* Botão CONTINUE Estilo Dark Green */
        .btn-continue {
            background: #0a3121; 
            color: white;
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 8px 15px -3px rgba(10, 49, 33, 0.3);
            display: block;
            text-decoration: none;
        }

        .btn-continue:hover {
            background: #061f15;
            transform: translateY(-2px);
        }

        .highlight-green {
            color: #00a300; 
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Imagem de Fundo (Página) -->
    <div class="page-bg"></div>

    <!-- Modal de Aviso (Formato de Cookie Centralizado) -->
    <div id="modalOverlay" class="overlay">
        <div class="trademark-modal">
            
            <!-- Botão de fechar que redireciona -->
            <a href="https://mwebora.com/8922/1671/7/??" class="close-link">
                <i data-lucide="x" class="w-5 h-5"></i>
            </a>

            <!-- Imagem de Comparação do Produto -->
            <div class="mb-6 flex justify-center">
                <img src="images/lipowave-liposlend.png" alt="LipoWave to Liposlend" class="max-w-[240px] h-auto pointer-events-none">
            </div>

            <!-- Conteúdo Textual -->
            <div class="space-y-3 mb-8">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900 leading-tight uppercase">
                    DUE TO TRADEMARK REGULATIONS
                </h2>
                <p class="text-lg text-slate-700 font-medium">
                    In <span class="font-bold">your region</span> and local area,
                </p>
                <p class="text-lg text-slate-700">
                    <span class="font-bold">Lipowave</span> is now officially renamed as
                </p>
                <div class="text-3xl sm:text-4xl highlight-green tracking-tight py-1">
                    LIPOSLEND Drops
                </div>
                <p class="text-base text-slate-800 font-semibold">
                    The formula remains exactly the same!
                </p>
            </div>

            <!-- Botão de Ação -->
            <a href="https://mwebora.com/8922/1671/7/??" class="btn-continue">
                CONTINUE
            </a>
        </div>
    </div>

    <script>
        // Inicializar ícones
        lucide.createIcons();

        // Abrir modal imediatamente e mantê-lo na tela
        window.onload = function() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
        };
    </script>
</body>
</html>
