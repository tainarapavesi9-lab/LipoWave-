<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- ✅ SEO & Meta Tags (Inglês Americano) -->
    <title>LipoWave™ Official Website | Now Liposlend Drops</title>
    <meta name="description" content="LipoWave has officially been renamed to Liposlend Drops. The same powerful formula you trust. Official store.">
    <link rel="canonical" href="https://lipowave.24offers.shop/">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden; 
        }
        
        /* Imagem de fundo nítida */
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('images/lipowave-mob.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        @media (min-width: 1024px) {
            .page-bg { 
                background-image: url('images/lipowave.png'); 
            }
        }

        /* Overlay escuro persistente (não sai da tela) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex; 
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }

        /* Modal Compacto seguindo o design da imagem */
        .trademark-modal {
            background: white;
            width: 100%;
            max-width: 400px; 
            border-radius: 1.5rem;
            position: relative;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Botão de fechar (X) agora é um link para a oferta */
        .close-link {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .close-link:hover { 
            background: #000; 
        }

        /* Botão CONTINUE principal */
        .btn-continue {
            background: #0a3121; 
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 8px 15px -3px rgba(10, 49, 33, 0.3);
            display: block;
            text-decoration: none;
        }

        .btn-continue:hover {
            background: #061f15;
            transform: translateY(-1px);
        }

        .highlight-green {
            color: #00a300; 
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Fundo da página -->
    <div class="page-bg"></div>

    <!-- Modal de Aviso (Persistente/Informativo) -->
    <div id="modalOverlay" class="overlay">
        <div class="trademark-modal">
            
            <!-- O botão 'X' agora redireciona para o link -->
            <a href="https://mwebora.com/8922/1671/7/??" class="close-link">
                <i data-lucide="x" class="w-4 h-4"></i>
            </a>

            <!-- Imagem de transição do produto -->
            <div class="mb-6 flex justify-center">
                <img src="images/lipowave-liposlend.png" alt="LipoWave to Liposlend" class="max-w-[220px] h-auto pointer-events-none">
            </div>

            <!-- Conteúdo textual em Inglês -->
            <div class="space-y-3 mb-8">
                <h2 class="text-lg sm:text-xl font-bold text-slate-900 leading-tight uppercase">
                    DUE TO TRADEMARK REGULATIONS
                </h2>
                <p class="text-base text-slate-700 font-medium">
                    In <span class="font-bold">Kansas</span> and your state,
                </p>
                <p class="text-base text-slate-700">
                    <span class="font-bold">Lipowave</span> is now officially renamed as
                </p>
                <div class="text-2xl sm:text-4xl highlight-green tracking-tight">
                    LIPOSLEND Drops
                </div>
                <p class="text-sm text-slate-800 font-semibold">
                    The formula remains exactly the same!
                </p>
            </div>

            <!-- Botão CONTINUE redirecionando para a oferta -->
            <a href="https://mwebora.com/8922/1671/7/??" class="btn-continue">
                CONTINUE
            </a>
        </div>
    </div>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // O modal abre imediatamente ao carregar e não possui lógica de fechamento (closeModal removido)
        window.onload = function() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
        };
    </script>
</body>
</html>
