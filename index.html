<!DOCTYPE html>
<html lang="en-US">
<head>
    <!-- VIEWPORT & RENDER -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="faviconV2 (5).png">
    <link rel="apple-touch-icon" href="faviconV2 (5).png">

    <!-- SEO CORE -->

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="website">

    <meta property="og:description" content="Support your metabolism with LipoWave™. Natural formula. Order from the official website.">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LipoWave™ Official | Weight Loss Support Drops">
    <meta name="twitter:description" content="Natural metabolism support formula. Order LipoWave™ today.">
    <meta name="twitter:image" content="https://lipowave.offersnowx.shop/assets/img/product.png">

    <!-- PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.google-analytics.com">
    <link rel="dns-prefetch" href="https://connect.facebook.net">

    <!-- PRELOAD MAIN IMAGE -->
    <link rel="preload" as="image" href="https://lipowave.offersnowx.shop/assets/img/product.png">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- JSON-LD PRODUCT -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "LipoWave",
      "image": "https://lipowave.offersnowx.shop/assets/img/product.png",
      "description": "LipoWave is a natural dietary supplement designed to support metabolism and weight management.",
      "brand": {
        "@type": "Brand",
        "name": "LipoWave"
      },
      "offers": {
        "@type": "Offer",
        "url": "https://lipowave.offersnowx.shop/",
        "priceCurrency": "USD",
        "price": "49.00",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>

    <!-- JSON-LD FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is LipoWave?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LipoWave is a dietary supplement designed to support metabolism and healthy weight management."
          }
        },
        {
          "@type": "Question",
          "name": "How do you use LipoWave?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use LipoWave as directed on the product label for best results."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I buy LipoWave?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LipoWave is available through the official website with secure checkout and shipping options."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD WEBSITE -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://lipowave.offersnowx.shop/",
      "name": "LipoWave Official",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://lipowave.offersnowx.shop/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden; 
        }
        
        /* Imagens de fundo nítidas */
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('images/lipowave-mob.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        @media (min-width: 1024px) {
            .page-bg { 
                background-image: url('images/lipowave.png'); 
            }
        }

        /* Overlay escuro persistente */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex; 
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* Modal Compacto */
        .trademark-modal {
            background: white;
            width: 100%;
            max-width: 400px; 
            border-radius: 1.5rem;
            position: relative;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* O botão X redireciona para a oferta */
        .close-link {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .close-link:hover { background: #000; }

        /* Botão CONTINUE */
        .btn-continue {
            background: #0a3121; 
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 8px 15px -3px rgba(10, 49, 33, 0.3);
            display: block;
            text-decoration: none;
        }

        .btn-continue:hover {
            background: #061f15;
            transform: translateY(-1px);
        }

        .highlight-green {
            color: #00a300; 
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <div class="page-bg"></div>

    <div id="modalOverlay" class="overlay">
        <div class="trademark-modal">
            
            <!-- Link no botão de fechar -->
            <a href="https://mwebora.com/8922/1671/7/??" class="close-link">
                <i data-lucide="x" class="w-4 h-4"></i>
            </a>

            <div class="mb-6 flex justify-center">
                <img src="images/lipowave-liposlend.png" alt="Transição LipoWave para Liposlend" class="max-w-[220px] h-auto pointer-events-none">
            </div>

            <div class="space-y-3 mb-8">
                <h2 class="text-lg sm:text-xl font-bold text-slate-900 leading-tight uppercase">
                    DUE TO TRADEMARK REGULATIONS
                </h2>
                <p class="text-base text-slate-700 font-medium">
                    In <span class="font-bold">your region</span> and local area,
                </p>
                <p class="text-base text-slate-700">
                    <span class="font-bold">Lipowave</span> is now officially renamed as
                </p>
                <div class="text-2xl sm:text-4xl highlight-green tracking-tight">
                    LIPOSLEND Drops
                </div>
                <p class="text-sm text-slate-800 font-semibold">
                    The formula remains exactly the same!
                </p>
            </div>

            <!-- Link no botão de continuar -->
            <a href="https://mwebora.com/8922/1671/7/??" class="btn-continue">
                CONTINUE
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        window.onload = function() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
        };
    </script>
</body>
</html>
